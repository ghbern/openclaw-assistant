name: Android Candidate Simple

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare google-services.json
        run: |
          cat > app/google-services.json << 'EOT'
          {
            "project_info": {"project_number": "000000000000", "project_id": "mock-project-id", "storage_bucket": "mock-project-id.appspot.com"},
            "client": [
              {"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": {"package_name": "com.openclaw.assistant"}}, "api_key": [{"current_key": "AIzaSyA123456789012345678901234567890123"}], "services": {"appinvite_service": {"other_platform_oauth_client": []}}},
              {"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000001", "android_client_info": {"package_name": "com.openclaw.assistant.debug"}}, "api_key": [{"current_key": "AIzaSyA123456789012345678901234567890123"}], "services": {"appinvite_service": {"other_platform_oauth_client": []}}}
            ],
            "configuration_version": "1"
          }
          EOT

      - name: Build debug APK
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-stable
          path: app/build/outputs/apk/debug/app-debug.apk
